<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>서재 — 종로도서관 AI 도서 추천</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#07213a;--teal:#00cfc0;--teal2:#00a898;--blue:#3182ff;
  --bg-from:#eef3ff;--bg-to:#e8f6f4;
  --surface:#fff;--surface2:#f4f7fb;
  --txt:#1a2a3a;--txt-m:#5a7088;--txt-l:#94a8bb;
  --border:rgba(0,207,192,.15);
  --green:#0d9e6e;--green-bg:#e2f7ef;
  --red:#d44;--red-bg:#fdeaea;
  --orange:#e68a00;--orange-bg:#fff6e6;
  --shadow:0 3px 16px rgba(7,33,58,.07);
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:'Noto Sans KR',sans-serif;background:linear-gradient(160deg,var(--bg-from),var(--bg-to));color:var(--txt)}
.shell{width:100%;max-width:560px;height:100vh;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden;position:relative}

/* ══════ 메인 화면 ══════ */
.main-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:40px 28px;text-align:center;transition:opacity .5s,transform .5s;overflow-y:auto}
.main-screen.hide{opacity:0;transform:translateY(-30px);pointer-events:none;position:absolute;inset:0}

.mascot{width:100px;height:100px;border-radius:50%;overflow:hidden;margin-bottom:20px;box-shadow:0 6px 24px rgba(0,207,192,.2);border:3px solid rgba(0,207,192,.3);animation:float 3s ease-in-out infinite}
.mascot img{width:100%;height:100%;object-fit:cover}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}

.main-title{font-size:28px;font-weight:900;color:var(--navy);line-height:1.5;margin-bottom:8px}
.main-title .hl{background:linear-gradient(135deg,var(--teal),var(--blue));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.main-sub{font-size:16px;color:var(--txt-m);line-height:1.7;margin-bottom:32px;font-weight:300}

.main-input-wrap{width:100%;max-width:440px;position:relative;margin-bottom:28px}
.main-input{width:100%;background:var(--surface);border:2px solid rgba(0,207,192,.2);border-radius:16px;padding:18px 60px 18px 22px;font-size:17px;font-family:inherit;color:var(--txt);outline:none;box-shadow:var(--shadow);transition:.3s}
.main-input::placeholder{color:var(--txt-l);font-weight:300}
.main-input:focus{border-color:var(--teal);box-shadow:0 0 0 4px rgba(0,207,192,.1),var(--shadow)}
.main-send{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:48px;height:48px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,207,192,.3);transition:.15s}
.main-send:hover{transform:translateY(-50%) scale(1.05)}
.main-send:active{transform:translateY(-50%) scale(.92)}

.chip-label{font-size:13px;color:var(--txt-l);margin-bottom:12px;font-weight:400}
.chips{display:flex;flex-wrap:wrap;justify-content:center;gap:8px;max-width:440px}
.chip{background:rgba(0,207,192,.06);border:1.5px solid rgba(0,207,192,.18);color:var(--navy);font-size:15px;font-weight:500;padding:11px 18px;border-radius:24px;cursor:pointer;transition:.2s;font-family:inherit;line-height:1.4}
.chip:hover{background:rgba(0,207,192,.15);border-color:var(--teal)}
.chip:active{transform:scale(.96)}

/* ══════ 채팅 화면 ══════ */
.chat-screen{display:none;flex-direction:column;flex:1;overflow:hidden}
.chat-screen.show{display:flex}

.chat-hdr{flex-shrink:0;background:var(--navy);padding:14px 20px;display:flex;align-items:center;gap:12px}
.chat-av{width:40px;height:40px;border-radius:50%;overflow:hidden;border:2px solid rgba(0,207,192,.4);flex-shrink:0}
.chat-av img{width:100%;height:100%;object-fit:cover}
.chat-info{flex:1}
.chat-name{font-size:16px;font-weight:700;color:#fff}
.chat-status{font-size:12px;color:var(--teal);display:flex;align-items:center;gap:5px;margin-top:1px}
.chat-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
.chat-back{background:none;border:1.5px solid rgba(255,255,255,.25);color:#fff;font-size:13px;padding:7px 16px;border-radius:20px;cursor:pointer;font-family:inherit;transition:.2s}
.chat-back:hover{background:rgba(255,255,255,.1)}

.chat-body{flex:1;overflow-y:auto;padding:20px 18px;scroll-behavior:smooth}
.chat-body::-webkit-scrollbar{width:3px}
.chat-body::-webkit-scrollbar-thumb{background:var(--teal);border-radius:3px}

/* ── 메시지 ── */
.brow{display:flex;gap:10px;margin-bottom:14px;animation:popIn .35s cubic-bezier(.175,.885,.32,1.275)}
.brow.ai{align-items:flex-start}
.brow.usr{justify-content:flex-end}
.msg-av{width:38px;height:38px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid rgba(0,207,192,.3)}
.msg-av img{width:100%;height:100%;object-fit:cover}

.bbl{max-width:82%;padding:14px 18px;line-height:1.85;font-size:16px;word-break:keep-all}
.bbl.ai{background:var(--surface);border:1px solid var(--border);border-radius:5px 18px 18px 18px;box-shadow:var(--shadow);color:var(--txt)}
.bbl.usr{background:linear-gradient(135deg,var(--teal2),var(--blue));border-radius:18px 18px 5px 18px;color:#fff;font-weight:500}
.bbl-name{font-size:11px;font-weight:700;color:var(--teal2);margin-bottom:5px;letter-spacing:.05em}
.cursor{display:inline-block;width:2px;height:1em;background:var(--teal);margin-left:2px;animation:blink 1s infinite;vertical-align:text-bottom}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

/* ── 로딩 ── */
.lrow{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;animation:popIn .35s}
.lbbl{background:var(--surface);border:1px solid var(--border);border-radius:5px 18px 18px 18px;padding:16px 20px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.lring{width:40px;height:40px;position:relative;flex-shrink:0}
.lring-c{width:100%;height:100%;border:3px solid rgba(0,207,192,.15);border-top-color:var(--teal);border-radius:50%;animation:spin 1.2s linear infinite}
.lring img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;object-fit:cover;border-radius:50%}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-size:15px;color:var(--txt-m)}
.ldots{display:inline-flex;gap:4px;margin-left:4px}
.ldots span{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:dotPulse 1.2s infinite}
.ldots span:nth-child(2){animation-delay:.2s}
.ldots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1.2)}}

/* ── 책 카드 ── */
.book-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px;opacity:0;transform:translateY(10px);animation:fadeUp .5s forwards}
.book-top{display:flex}
.book-img{width:80px;min-height:115px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.book-img img{width:100%;height:100%;object-fit:cover}
.book-img .ph{font-size:22px;color:var(--txt-l);font-weight:700}
.book-body{flex:1;padding:14px 16px;min-width:0}
.book-title{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-author{font-size:14px;color:var(--txt-m);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-meta{font-size:12px;color:var(--txt-l)}
.book-avail{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;border-left:1px solid rgba(0,207,192,.1);min-width:84px;gap:4px;background:var(--surface2)}
.badge{font-size:12px;font-weight:700;padding:5px 10px;border-radius:6px;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-no{background:var(--red-bg);color:var(--red)}
.b-wait{background:#f0f2f5;color:var(--txt-l);animation:pulse 1.3s infinite}
.b-warn{background:var(--orange-bg);color:var(--orange)}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.b-link{font-size:12px;color:var(--blue);text-decoration:none;padding:4px 10px;border-radius:6px;background:rgba(49,130,255,.06);font-weight:500;transition:.15s;margin-top:2px}
.b-link:hover{background:rgba(49,130,255,.15)}
.book-loc{font-size:11px;color:var(--txt-l);text-align:center;margin-top:2px}
.book-comment{border-top:1px solid rgba(0,207,192,.1);padding:12px 16px;font-size:15px;line-height:1.8;color:var(--txt-m);background:linear-gradient(135deg,rgba(0,207,192,.03),rgba(49,130,255,.03))}

/* ── 하단 입력 ── */
.chat-input{flex-shrink:0;padding:10px 18px 22px;background:rgba(238,243,255,.95);backdrop-filter:blur(10px)}
.ci-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:2px solid rgba(0,207,192,.2);border-radius:14px;padding:5px 5px 5px 18px;box-shadow:var(--shadow);transition:.2s}
.ci-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 4px rgba(0,207,192,.1)}
.ci-input{flex:1;background:none;border:none;outline:none;font-family:inherit;font-size:16px;color:var(--txt);padding:10px 0;resize:none;min-height:24px;max-height:80px;line-height:1.5}
.ci-input::placeholder{color:var(--txt-l);font-weight:300}
.ci-send{width:46px;height:46px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,207,192,.3);transition:.15s}
.ci-send:hover{transform:scale(1.05)}
.ci-send:active{transform:scale(.92)}
.ci-send:disabled{opacity:.3;cursor:not-allowed;transform:none}

@keyframes popIn{from{opacity:0;transform:scale(.92) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="shell">

  <!-- ══ 메인 화면 ══ -->
  <div class="main-screen" id="mainScreen">
    <div class="mascot"><img src="https://raw.githubusercontent.com/jnlib/find/main/mascot.png" alt="마스코트"></div>
    <div class="main-title">고민을 말하면<br><span class="hl">책을 찾아드려요</span></div>
    <p class="main-sub">종로도서관 AI 사서가<br>지금 마음에 맞는 책을 추천해드려요</p>
    <div class="main-input-wrap">
      <input class="main-input" id="mainQ" type="text" autocomplete="off" spellcheck="false"
        placeholder="어떤 고민이 있으신가요?"
        onkeydown="if(event.key==='Enter')goMain()">
      <button class="main-send" onclick="goMain()">&#10140;</button>
    </div>
    <div class="chip-label">이런 고민이 있으신가요?</div>
    <div class="chips" id="mainChips"></div>
  </div>

  <!-- ══ 채팅 화면 ══ -->
  <div class="chat-screen" id="chatScreen">
    <div class="chat-hdr">
      <div class="chat-av"><img src="https://raw.githubusercontent.com/jnlib/find/main/mascot.png" alt=""></div>
      <div class="chat-info">
        <div class="chat-name">AI 사서</div>
        <div class="chat-status"><span class="chat-dot"></span>종로도서관 연결됨</div>
      </div>
      <button class="chat-back" onclick="goBack()">처음으로</button>
    </div>
    <div class="chat-body" id="chatBody"></div>
    <div class="chat-input">
      <div class="ci-wrap">
        <textarea class="ci-input" id="chatQ" rows="1" placeholder="다른 고민도 말씀해보세요"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();goChat();}"></textarea>
        <button class="ci-send" id="chatBtn" onclick="goChat()">&#10140;</button>
      </div>
    </div>
  </div>

</div>

<script>
var WORKER = 'https://seojae.hdh1231.workers.dev';
var MASCOT = 'https://raw.githubusercontent.com/jnlib/find/main/mascot.png';
var libName = '종로도서관';
var isLoading = false;
var bookIdx = 0;

var EXAMPLES = [
  '요즘 마음이 공허하고 허무해요',
  '직장에서 번아웃이 온 것 같아요',
  '중요한 결정을 앞두고 있어요',
  '이별 후에 마음을 추스르고 싶어요',
  '새로운 시작이 두렵고 자신이 없어요',
  '잠이 안 올 때 읽을 잔잔한 책',
];

var LOAD_MSGS = [
  '고민을 분석하고 있어요',
  '어울리는 책을 찾고 있어요',
  '종로도서관에 있는지 확인해요',
  '추천 이유를 정리하고 있어요',
];

var $ = function(id) { return document.getElementById(id); };

/* ── 초기화 ── */
(function init() {
  var html = '';
  EXAMPLES.forEach(function(t) {
    html += '<button class="chip" onclick="startWith(\'' + t.replace(/'/g,"\\'") + '\')">' + t + '</button>';
  });
  $('mainChips').innerHTML = html;

  fetch(WORKER + '/libcode').then(function(r){return r.json();}).then(function(d) {
    libName = d.libName || '종로도서관';
  }).catch(function(){});

  $('chatQ').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 80) + 'px';
  });
})();

/* ── 화면 전환 ── */
function showChat() {
  $('mainScreen').classList.add('hide');
  $('chatScreen').classList.add('show');
}

function goBack() {
  if (isLoading) return;
  $('chatScreen').classList.remove('show');
  $('mainScreen').classList.remove('hide');
  $('chatBody').innerHTML = '';
  $('mainQ').value = '';
  bookIdx = 0;
}

/* ── 메인에서 시작 ── */
function startWith(txt) { $('mainQ').value = txt; goMain(); }

function goMain() {
  var q = $('mainQ').value.trim();
  if (!q || isLoading) return;
  showChat();
  setTimeout(function() { doRecommend(q); }, 400);
}

function goChat() {
  var q = $('chatQ').value.trim();
  if (!q || isLoading) return;
  $('chatQ').value = '';
  $('chatQ').style.height = 'auto';
  doRecommend(q);
}

/* ── 채팅 요소 ── */
function addUser(text) {
  var row = document.createElement('div');
  row.className = 'brow usr';
  row.innerHTML = '<div class="bbl usr">' + esc(text) + '</div>';
  $('chatBody').appendChild(row);
  scroll();
}

function addAi(text, skip) {
  var row = document.createElement('div');
  row.className = 'brow ai';
  var bbl = document.createElement('div');
  bbl.className = 'bbl ai';
  bbl.innerHTML = '<div class="bbl-name">AI 사서</div>';
  var span = document.createElement('span');
  bbl.appendChild(span);
  row.innerHTML = '<div class="msg-av"><img src="'+MASCOT+'" alt=""></div>';
  row.appendChild(bbl);
  $('chatBody').appendChild(row);

  if (skip) { span.innerHTML = text.replace(/\n/g,'<br>'); scroll(); return Promise.resolve(); }

  return new Promise(function(resolve) {
    var cur = document.createElement('span');
    cur.className = 'cursor';
    bbl.appendChild(cur);
    var chars = text.split(''), i = 0;
    var t = setInterval(function() {
      if (i < chars.length) {
        if (chars[i] === '\n') span.appendChild(document.createElement('br'));
        else span.appendChild(document.createTextNode(chars[i]));
        i++; scroll();
      } else {
        clearInterval(t);
        if (cur.parentNode) cur.remove();
        resolve();
      }
    }, 20);
  });
}

function addLoad() {
  var row = document.createElement('div');
  row.className = 'lrow'; row.id = 'loadRow';
  row.innerHTML = '<div class="msg-av"><img src="'+MASCOT+'" alt=""></div>'
    + '<div class="lbbl"><div class="lring"><div class="lring-c"></div>'
    + '<img src="'+MASCOT+'" alt=""></div>'
    + '<div><div class="ltxt" id="loadTxt">'+LOAD_MSGS[0]
    + '<span class="ldots"><span></span><span></span><span></span></span></div></div></div>';
  $('chatBody').appendChild(row); scroll();
  var mi = 0;
  return setInterval(function() {
    mi = (mi+1) % LOAD_MSGS.length;
    var el = $('loadTxt');
    if (el) el.innerHTML = LOAD_MSGS[mi] + '<span class="ldots"><span></span><span></span><span></span></span>';
  }, 2500);
}

function rmLoad(timer) {
  clearInterval(timer);
  var el = $('loadRow');
  if (el) el.remove();
}

function addBook(book, idx) {
  var row = document.createElement('div');
  row.className = 'brow ai';
  row.style.paddingLeft = '48px';
  var card = document.createElement('div');
  card.className = 'book-card';
  card.style.animationDelay = (idx * 100) + 'ms';
  var hasImg = !!book.bookImageURL;
  var meta = [book.publisher, book.publication_year].filter(Boolean).join(' · ');

  // 상태 뱃지 (Worker에서 이미 확인됨)
  var badgeCls = 'badge b-ok';
  var badgeTxt = '대출가능';
  if (book.status === '대출중') { badgeCls = 'badge b-warn'; badgeTxt = '대출중'; }

  var locHtml = book.location ? '<div class="book-loc">' + book.location.replace('[종로]','').trim() + '</div>' : '';
  var linkHtml = book.detailUrl ? '<a class="b-link" href="'+book.detailUrl+'" target="_blank">상세보기</a>' : '';

  card.innerHTML = '<div class="book-top">'
    + '<div class="book-img">'
    + (hasImg ? '<img src="'+book.bookImageURL+'" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' : '')
    + '<div class="ph" style="'+(hasImg?'display:none':'display:flex')+'">'+(book.bookname?book.bookname.slice(0,1):'?')+'</div></div>'
    + '<div class="book-body">'
    + '<div class="book-title">'+(book.bookname||'제목 없음')+'</div>'
    + '<div class="book-author">'+(book.authors||'저자 미상')+'</div>'
    + '<div class="book-meta">'+meta+'</div></div>'
    + '<div class="book-avail">'
    + '<span class="'+badgeCls+'">'+badgeTxt+'</span>'
    + '<div style="font-size:11px;color:var(--txt-l)">'+libName+'</div>'
    + locHtml + linkHtml + '</div></div>'
    + (book.comment ? '<div class="book-comment">'+esc(book.comment)+'</div>' : '');

  row.appendChild(card);
  $('chatBody').appendChild(row);
  scroll();
  bookIdx++;
}

/* ── 추천 실행 ── */
function doRecommend(query) {
  isLoading = true;
  $('chatBtn').disabled = true;
  addUser(query);
  var lt = addLoad();

  fetch(WORKER+'/recommend', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({query:query})
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(d){throw new Error(d.error||'오류');});
    return r.json();
  }).then(function(rec) {
    rmLoad(lt);
    return addAi(rec.reply || '관련 책을 찾아볼게요.').then(function() {
      var books = rec.books || [];
      if (!books.length) {
        return addAi(rec.message || '아쉽지만 관련 책을 찾지 못했어요.\n다른 표현으로 다시 말씀해주세요!', true).then(done);
      }
      books.forEach(function(b, i) {
        setTimeout(function() {
          addBook(b, i);
          if (i === books.length - 1) {
            setTimeout(function() {
              addAi('다른 고민이 있으시면 편하게 말씀해주세요!', true).then(done);
            }, 500);
          }
        }, i * 350);
      });
    });
  }).catch(function(e) {
    rmLoad(lt);
    addAi('죄송해요, 문제가 생겼어요.\n잠시 후 다시 시도해주세요!', true).then(done);
  });
}

function done() { isLoading = false; $('chatBtn').disabled = false; }
function scroll() { var c = $('chatBody'); setTimeout(function(){ c.scrollTop = c.scrollHeight; }, 50); }
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>'); }
</script>
</body>
</html>
