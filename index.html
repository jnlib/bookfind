<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>서재 — 고민을 말하면 책을 찾아드려요</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#07213a;--teal:#00cfc0;--teal2:#00a898;--blue:#3182ff;
  --bg:linear-gradient(160deg,#eef3ff,#e8f6f4);
  --surface:#fff;--surface2:#f4f7fb;
  --txt:#1a2a3a;--txt-m:#5a7088;--txt-l:#94a8bb;
  --border:rgba(0,207,192,.15);
  --green:#0d9e6e;--green-bg:#e2f7ef;
  --red:#d44;--red-bg:#fdeaea;
  --shadow:0 3px 16px rgba(7,33,58,.07);
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;touch-action:manipulation}
body{font-family:'Noto Sans KR',sans-serif;background:#eef3ff;background:var(--bg);color:var(--txt)}

.shell{width:100%;max-width:560px;height:100vh;height:100dvh;margin:0 auto;display:flex;flex-direction:column;overflow:hidden}

/* ── 헤더 ── */
.hdr{flex-shrink:0;background:var(--navy);padding:18px 24px;display:flex;align-items:center;gap:14px}
.hdr-av{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-av img{width:28px;height:28px;object-fit:contain;filter:brightness(10)}
.hdr-info{flex:1}
.hdr-name{font-size:17px;font-weight:700;color:#fff}
.hdr-status{font-size:13px;color:var(--teal);display:flex;align-items:center;gap:5px;margin-top:2px}
.hdr-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal)}
.hdr-new{background:none;border:1.5px solid rgba(255,255,255,.25);color:#fff;font-size:13px;padding:7px 16px;border-radius:20px;cursor:pointer;font-family:inherit;transition:.2s}
.hdr-new:hover{background:rgba(255,255,255,.1)}

/* ── 채팅 영역 ── */
.chat{flex:1;overflow-y:auto;padding:20px 18px;scroll-behavior:smooth}
.chat::-webkit-scrollbar{width:3px}
.chat::-webkit-scrollbar-thumb{background:var(--teal);border-radius:3px}

/* ── 메시지 행 ── */
.brow{display:flex;gap:10px;margin-bottom:14px;animation:popIn .35s cubic-bezier(.175,.885,.32,1.275)}
.brow.ai{align-items:flex-start}
.brow.usr{justify-content:flex-end}

.av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--teal),var(--blue));display:flex;align-items:center;justify-content:center;flex-shrink:0}
.av img{width:24px;height:24px;filter:brightness(10)}

/* ── 버블 ── */
.bbl{max-width:82%;padding:14px 18px;line-height:1.85;font-size:16px;word-break:keep-all}
.bbl.ai{background:var(--surface);border:1px solid var(--border);border-radius:5px 18px 18px 18px;box-shadow:var(--shadow);color:var(--txt)}
.bbl.usr{background:linear-gradient(135deg,var(--teal2),var(--blue));border-radius:18px 18px 5px 18px;color:#fff;font-weight:500}
.bbl-name{font-size:12px;font-weight:700;color:var(--teal2);margin-bottom:6px;letter-spacing:.05em}

/* ── 타이핑 커서 ── */
.cursor{display:inline-block;width:2px;height:1em;background:var(--teal);margin-left:2px;animation:blink 1s infinite;vertical-align:text-bottom}
@keyframes blink{0%,50%{opacity:1}51%,100%{opacity:0}}

/* ── 로딩 행 ── */
.lrow{display:flex;gap:10px;align-items:flex-start;margin-bottom:14px;animation:popIn .35s}
.lbbl{background:var(--surface);border:1px solid var(--border);border-radius:5px 18px 18px 18px;padding:18px 22px;box-shadow:var(--shadow);display:flex;align-items:center;gap:14px}
.lring{width:42px;height:42px;position:relative;flex-shrink:0}
.lring-c{width:100%;height:100%;border:3px solid rgba(0,207,192,.15);border-top-color:var(--teal);border-radius:50%;animation:spin 1.2s linear infinite}
.lring img{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:22px;height:22px;filter:brightness(0) saturate(100%) invert(35%) sepia(90%) saturate(500%) hue-rotate(140deg);animation:bounce 1s ease-in-out infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes bounce{0%,100%{transform:translate(-50%,-50%) scale(1)}50%{transform:translate(-50%,-55%) scale(1.1)}}
.ltxt{font-size:15px;color:var(--txt-m);font-weight:400}
.ldots{display:inline-flex;gap:4px;margin-left:4px}
.ldots span{width:5px;height:5px;border-radius:50%;background:var(--teal);animation:dotPulse 1.2s infinite}
.ldots span:nth-child(2){animation-delay:.2s}
.ldots span:nth-child(3){animation-delay:.4s}
@keyframes dotPulse{0%,60%,100%{opacity:.2;transform:scale(.8)}30%{opacity:1;transform:scale(1.2)}}

/* ── 예시 칩 ── */
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px;animation:popIn .4s}
.chip{background:rgba(0,207,192,.08);border:1.5px solid rgba(0,207,192,.2);color:var(--navy);font-size:15px;font-weight:500;padding:12px 18px;border-radius:24px;cursor:pointer;transition:.2s;font-family:inherit;line-height:1.4}
.chip:hover{background:rgba(0,207,192,.18);border-color:var(--teal)}
.chip:active{transform:scale(.96)}

/* ── 책 카드 (채팅 내) ── */
.book-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px;opacity:0;transform:translateY(10px);animation:fadeUp .4s forwards}
.book-top{display:flex}
.book-img{width:80px;min-height:115px;background:var(--surface2);flex-shrink:0;overflow:hidden;display:flex;align-items:center;justify-content:center}
.book-img img{width:100%;height:100%;object-fit:cover}
.book-img .ph{font-size:22px;color:var(--txt-l);font-weight:700}
.book-body{flex:1;padding:14px 16px;min-width:0}
.book-title{font-size:17px;font-weight:700;line-height:1.5;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.book-author{font-size:14px;color:var(--txt-m);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.book-meta{font-size:12px;color:var(--txt-l)}
.book-avail{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;border-left:1px solid rgba(0,207,192,.1);min-width:82px;gap:4px;background:var(--surface2)}
.badge{font-size:12px;font-weight:700;padding:4px 10px;border-radius:6px;white-space:nowrap}
.b-ok{background:var(--green-bg);color:var(--green)}
.b-no{background:var(--red-bg);color:var(--red)}
.b-wait{background:#f0f2f5;color:var(--txt-l);animation:pulse 1.3s infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.b-link{font-size:12px;color:var(--blue);text-decoration:none;padding:4px 10px;border-radius:6px;background:rgba(49,130,255,.06);font-weight:500;transition:.15s}
.b-link:hover{background:rgba(49,130,255,.15)}
.book-loc{font-size:11px;color:var(--txt-l);text-align:center;margin-top:2px}
.book-comment{border-top:1px solid rgba(0,207,192,.1);padding:12px 16px;font-size:15px;line-height:1.8;color:var(--txt-m);background:linear-gradient(135deg,rgba(0,207,192,.03),rgba(49,130,255,.03))}

/* ── 입력 영역 ── */
.iarea{flex-shrink:0;padding:12px 18px 24px;background:rgba(238,243,255,.9);backdrop-filter:blur(10px)}
.ibox-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:2px solid rgba(0,207,192,.2);border-radius:16px;padding:6px 6px 6px 20px;box-shadow:var(--shadow);transition:.2s}
.ibox-wrap:focus-within{border-color:var(--teal);box-shadow:0 0 0 4px rgba(0,207,192,.1)}
.ibox{flex:1;background:none;border:none;outline:none;font-family:'Noto Sans KR',sans-serif;font-size:17px;color:var(--txt);padding:12px 0;resize:none;min-height:24px;max-height:100px;line-height:1.5}
.ibox::placeholder{color:var(--txt-l);font-weight:300}
.sbtn{width:50px;height:50px;border:none;border-radius:13px;background:linear-gradient(135deg,var(--teal),var(--blue));color:#fff;font-size:20px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s;box-shadow:0 4px 12px rgba(0,207,192,.3)}
.sbtn:hover{transform:scale(1.05)}
.sbtn:active{transform:scale(.92)}
.sbtn:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* ── 애니메이션 ── */
@keyframes popIn{from{opacity:0;transform:scale(.9) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes fadeUp{to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
  .chat{padding:16px 14px}
  .iarea{padding:10px 14px 20px}
}
</style>
</head>
<body>
<div class="shell">

  <div class="hdr">
    <div class="hdr-av"><img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt=""></div>
    <div class="hdr-info">
      <div class="hdr-name">AI 사서 — 서재</div>
      <div class="hdr-status"><span class="hdr-dot" id="sDot"></span><span id="sLib">연결 중…</span></div>
    </div>
    <button class="hdr-new" onclick="goHome()">새 대화</button>
  </div>

  <div class="chat" id="chat">
    <!-- 인사 메시지 -->
    <div class="brow ai" id="greeting">
      <div class="av"><img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt=""></div>
      <div class="bbl ai">
        <div class="bbl-name">AI 사서</div>
        안녕하세요! 종로도서관 AI 사서예요.<br>
        지금 어떤 고민이 있으신가요?<br>
        아래에서 골라보시거나, 직접 말씀해주세요.
      </div>
    </div>
    <div class="chips" id="chips"></div>
  </div>

  <div class="iarea">
    <div class="ibox-wrap">
      <textarea id="q" class="ibox" rows="1" placeholder="고민이나 상황을 편하게 말해주세요" onkeydown="handleKey(event)"></textarea>
      <button class="sbtn" id="goBtn" onclick="go()">&#10140;</button>
    </div>
  </div>

</div>

<script>
var WORKER = 'https://seojae.hdh1231.workers.dev';
var libName = '종로도서관';
var isLoading = false;

var EXAMPLES = [
  '요즘 마음이 공허하고 허무해요',
  '직장에서 번아웃이 온 것 같아요',
  '중요한 결정을 앞두고 있어요',
  '이별 후에 마음을 추스르고 싶어요',
  '새로운 시작이 두렵고 자신이 없어요',
  '잠이 안 올 때 읽을 잔잔한 책',
];

var LOADING_MSGS = [
  '고민을 분석하고 있어요',
  '관련 책을 검색 중이에요',
  '종로도서관 소장 여부를 확인해요',
  '추천 멘트를 작성하고 있어요',
  '거의 다 됐어요!',
];

var $ = function(id) { return document.getElementById(id); };

/* ── 초기화 ── */
function init() {
  // 예시 칩 렌더
  var html = '';
  EXAMPLES.forEach(function(txt) {
    html += '<button class="chip" onclick="fillAndGo(\'' + txt.replace(/'/g,"\\'") + '\')">' + txt + '</button>';
  });
  $('chips').innerHTML = html;

  // 상태 확인
  fetch(WORKER + '/libcode').then(function(r){return r.json();}).then(function(d) {
    libName = d.libName;
    $('sDot').style.background = 'var(--teal)';
    $('sLib').textContent = libName + ' 연결됨';
  }).catch(function() {
    $('sLib').textContent = '연결 오류';
  });

  // 텍스트영역 자동 높이
  $('q').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
}

function fillAndGo(txt) { $('q').value = txt; go(); }

/* ── 새 대화 ── */
function goHome() {
  if (isLoading) return;
  $('chat').innerHTML = '';
  // 인사 다시
  addAiBubble('안녕하세요! 종로도서관 AI 사서예요.\n지금 어떤 고민이 있으신가요?\n아래에서 골라보시거나, 직접 말씀해주세요.');
  // 칩 다시
  var chipDiv = document.createElement('div');
  chipDiv.className = 'chips';
  var html = '';
  EXAMPLES.forEach(function(txt) {
    html += '<button class="chip" onclick="fillAndGo(\'' + txt.replace(/'/g,"\\'") + '\')">' + txt + '</button>';
  });
  chipDiv.innerHTML = html;
  $('chat').appendChild(chipDiv);
  $('q').value = '';
  scrollBottom();
}

/* ── 채팅 요소 추가 ── */
function addUserBubble(text) {
  var row = document.createElement('div');
  row.className = 'brow usr';
  row.innerHTML = '<div class="bbl usr">' + escHtml(text) + '</div>';
  $('chat').appendChild(row);
  scrollBottom();
}

function addAiBubble(text, skipTyping) {
  var row = document.createElement('div');
  row.className = 'brow ai';
  var bbl = document.createElement('div');
  bbl.className = 'bbl ai';
  bbl.innerHTML = '<div class="bbl-name">AI 사서</div>';
  var content = document.createElement('span');
  bbl.appendChild(content);
  row.innerHTML = '<div class="av"><img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt=""></div>';
  row.appendChild(bbl);
  $('chat').appendChild(row);

  if (skipTyping) {
    content.innerHTML = text.replace(/\n/g, '<br>');
    scrollBottom();
    return Promise.resolve();
  }

  // 타이핑 효과
  return new Promise(function(resolve) {
    var cursor = document.createElement('span');
    cursor.className = 'cursor';
    bbl.appendChild(cursor);
    var chars = text.split('');
    var i = 0;
    var timer = setInterval(function() {
      if (i < chars.length) {
        if (chars[i] === '\n') {
          content.appendChild(document.createElement('br'));
        } else {
          content.appendChild(document.createTextNode(chars[i]));
        }
        i++;
        scrollBottom();
      } else {
        clearInterval(timer);
        if (cursor.parentNode) cursor.parentNode.removeChild(cursor);
        resolve();
      }
    }, 22);
  });
}

function addLoading() {
  var row = document.createElement('div');
  row.className = 'lrow';
  row.id = 'loadRow';
  row.innerHTML = '<div class="av"><img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt=""></div>'
    + '<div class="lbbl">'
    + '<div class="lring"><div class="lring-c"></div><img src="https://jnlib.sen.go.kr/resources/homepage/jnlib/img/jnlib_logo.png" alt=""></div>'
    + '<div><div class="ltxt" id="loadTxt">' + LOADING_MSGS[0] + '<span class="ldots"><span></span><span></span><span></span></span></div></div>'
    + '</div>';
  $('chat').appendChild(row);
  scrollBottom();

  // 메시지 순환
  var msgIdx = 0;
  var loadTimer = setInterval(function() {
    msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
    var el = $('loadTxt');
    if (el) el.innerHTML = LOADING_MSGS[msgIdx] + '<span class="ldots"><span></span><span></span><span></span></span>';
  }, 2500);
  return loadTimer;
}

function removeLoading(timer) {
  clearInterval(timer);
  var el = $('loadRow');
  if (el) el.parentNode.removeChild(el);
}

function addBookCard(book, idx) {
  var row = document.createElement('div');
  row.className = 'brow ai';
  row.style.paddingLeft = '50px';

  var card = document.createElement('div');
  card.className = 'book-card';
  card.style.animationDelay = (idx * 120) + 'ms';

  var hasImg = !!book.bookImageURL;
  var meta = [book.publisher, book.publication_year].filter(Boolean).join(' · ');

  card.innerHTML = '<div class="book-top">'
    + '<div class="book-img">'
    + (hasImg ? '<img src="'+book.bookImageURL+'" alt="" onerror="this.style.display=\'none\';this.nextElementSibling.style.display=\'flex\'">' : '')
    + '<div class="ph" style="'+(hasImg?'display:none':'display:flex')+'">' + (book.bookname ? book.bookname.slice(0,1) : '?') + '</div></div>'
    + '<div class="book-body">'
    + '<div class="book-title">'+(book.bookname||'제목 없음')+'</div>'
    + '<div class="book-author">'+(book.authors||'저자 미상')+'</div>'
    + '<div class="book-meta">'+meta+'</div>'
    + '</div>'
    + '<div class="book-avail" id="av'+idx+'">'
    + '<span class="badge b-wait">확인 중</span>'
    + '<div style="font-size:11px;color:var(--txt-l)">'+libName+'</div>'
    + '</div>'
    + '</div>'
    + (book.comment ? '<div class="book-comment">' + escHtml(book.comment) + '</div>' : '');

  row.appendChild(card);
  $('chat').appendChild(row);
  scrollBottom();
}

/* ── 대출 상태 ── */
function updateLoanStatus(isbn, detailUrl, idx) {
  var col = $('av'+idx); if(!col) return;
  var badge = col.querySelector('.badge');
  fetch(WORKER + '/realcheck?isbn=' + isbn).then(function(r){return r.json();}).then(function(result) {
    if (!result) {
      badge.className='badge b-no'; badge.textContent='확인 불가';
    } else if (result.totalCount === 0) {
      badge.className='badge b-no'; badge.textContent='미소장';
    } else if (result.available) {
      badge.className='badge b-ok';
      badge.textContent = result.availCount + '/' + result.totalCount + ' 가능';
    } else {
      badge.className='badge b-no'; badge.textContent='전권 대출 중';
    }
    if (result && result.location) {
      var loc = document.createElement('div');
      loc.className = 'book-loc';
      loc.textContent = result.location.replace('[종로]','').trim();
      col.appendChild(loc);
    }
    var url = (result && result.detailUrl) ? result.detailUrl : detailUrl;
    if (url) {
      var link = document.createElement('a');
      link.className = 'b-link'; link.href = url; link.target = '_blank';
      link.textContent = '상세보기';
      col.appendChild(link);
    }
  }).catch(function(){
    badge.className='badge b-no'; badge.textContent='확인 불가';
  });
}

/* ── 메인 실행 ── */
function go() {
  var q = $('q').value.trim();
  if (!q || isLoading) return;

  isLoading = true;
  $('goBtn').disabled = true;
  $('q').value = '';
  $('q').style.height = 'auto';

  // 칩 숨기기
  var chips = $('chat').querySelectorAll('.chips');
  chips.forEach(function(c) { c.style.display = 'none'; });

  // 사용자 버블
  addUserBubble(q);

  // 로딩
  var loadTimer = addLoading();

  // 추천 요청
  fetch(WORKER + '/recommend', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ query: q })
  }).then(function(r) {
    if (!r.ok) return r.json().then(function(d){throw new Error(d.error||'오류');});
    return r.json();
  }).then(function(rec) {
    removeLoading(loadTimer);

    // AI 사서 공감 멘트 (타이핑)
    return addAiBubble(rec.reply || '관련 책을 찾아볼게요.').then(function() {
      var books = rec.books || [];
      if (!books.length) {
        return addAiBubble(rec.message || '도서관에서 관련 책을 찾지 못했어요.\n다른 표현으로 다시 말씀해주세요!', true);
      }

      // 책 카드들
      books.forEach(function(b, i) {
        setTimeout(function() {
          addBookCard(b, i);
          updateLoanStatus(b.isbn13, b.detailUrl, i);
        }, i * 300);
      });

      // 마무리 멘트
      setTimeout(function() {
        addAiBubble('다른 고민이 있으시면 언제든 말씀해주세요!', true);
        isLoading = false;
        $('goBtn').disabled = false;
      }, books.length * 300 + 400);
    });
  }).catch(function(e) {
    removeLoading(loadTimer);
    addAiBubble('죄송해요, 오류가 발생했어요.\n' + e.message + '\n다시 시도해주세요!', true);
    isLoading = false;
    $('goBtn').disabled = false;
  });
}

function scrollBottom() {
  var c = $('chat');
  setTimeout(function(){ c.scrollTop = c.scrollHeight; }, 50);
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

init();
</script>
</body>
</html>
